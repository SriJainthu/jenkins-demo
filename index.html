<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Smart Notice Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">

    <div class="modal-overlay" id="loginModal">
        <div class="modal-content" style="max-width: 350px;">
            <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Admin Login</h2>
            <p style="color: #94a3b8; margin: 10px 0 20px; font-size: 0.9rem;">Enter credentials to access controls.</p>
            
            <input type="password" id="adminPassInput" placeholder="Enter Password" style="text-align: center; letter-spacing: 4px;">
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" style="background: #334155;" onclick="closeLoginModal()">Cancel</button>
                <button class="btn-primary" onclick="verifyAdmin()">Unlock</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <i class="fas fa-exclamation-circle" id="modalIcon" style="font-size: 3.5rem; color: #f43f5e; margin-bottom: 20px;"></i>
            <h2 id="modalTitle">Attention</h2>
            <p id="modalMsg" style="color: #94a3b8; margin: 15px 0 25px; line-height: 1.5;"></p>
            <button class="btn-primary" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Success!</span>
    </div>

   <nav>
    <a href="index.html" class="logo" id="mainLogo">
        <i class="fas fa-bolt"></i> <span id="logoText">SMARTBOARD</span>
    </a>
    <div class="nav-links">
        <a href="index.html" id="dashLink">Dashboard</a>
        <a href="archive.html" id="archLink">Archives</a>
        <span id="settingsLink" style="display:none;"><a href="settings.html">Settings</a></span>
        
        <div class="auth-wrapper" style="display: inline-flex; align-items: center; margin-left: 15px;">
            <i class="fas fa-lock" id="loginBtn" onclick="handleAuthClick()" 
               style="cursor:pointer; color:#475569; font-size: 1.1rem; transition: all 0.3s ease;"></i>
        </div>
    </div>
</nav>

    <div class="container" id="mainContainer" style="display: flex; transition: all 0.5s ease;">
        <aside id="adminControls" style="display: none; width: 320px; margin-right: 40px;">
            <div class="glass-panel" id="inputPanel">
                <h3>New Broadcast</h3>
                <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 20px;">Post an update to the live board.</p>
                
                <input type="text" id="title" placeholder="Notice Title">
                <textarea id="desc" rows="5" placeholder="Detailed message content..."></textarea>
                
                <select id="type">
                    <option value="general">General Update</option>
                    <option value="exam">Exam Schedule</option>
                    <option value="event">Campus Event</option>
                </select>
                
                <button class="btn-primary" onclick="addNotice()">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Post Broadcast
                </button>
            </div>
        </aside>

        <main id="mainBoard" style="flex: 1;">
            <div id="noticeList"></div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. SECURITY LOGIC ---
        function handleAuthClick() {
            const isAdmin = sessionStorage.getItem('isAdmin');
            if(isAdmin === 'true') {
                // Logout Logic
                sessionStorage.removeItem('isAdmin');
                showToast("Logged out of Admin mode", true);
                checkAccess();
            } else {
                // Open Login Modal
                const modal = document.getElementById("loginModal");
                modal.style.display = "flex";
                document.getElementById("adminPassInput").value = "";
                gsap.to(modal, { opacity: 1, duration: 0.3 });
                gsap.from("#loginModal .modal-content", { scale: 0.8, y: 20, duration: 0.4, ease: "back.out" });
                setTimeout(() => document.getElementById("adminPassInput").focus(), 300);
            }
        }

        function closeLoginModal() {
            gsap.to("#loginModal", { opacity: 0, duration: 0.2, onComplete: () => {
                document.getElementById("loginModal").style.display = "none";
            }});
        }

        function verifyAdmin() {
            const passInput = document.getElementById("adminPassInput").value;
            if(passInput === "admin123") {
                sessionStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                showToast("Access Granted: Admin Mode On");
                checkAccess();
            } else {
                gsap.to("#loginModal .modal-content", { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
                showToast("Invalid Password", true);
            }
        }

      function checkAccess() {
    const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
    const settingsLink = document.getElementById('settingsLink');
    const loginBtn = document.getElementById('loginBtn');
    
    // Elements specific to index.html (will safely ignore if on other pages)
    const adminControls = document.getElementById('adminControls');
    const mainContainer = document.getElementById('mainContainer');

    if (isAdmin) {
        // 1. Show Settings Name
        if (settingsLink) settingsLink.style.display = "inline";
        
        // 2. Style the Unlocked Icon (Consistent Purple Glow)
        if (loginBtn) {
            loginBtn.className = "fas fa-unlock";
            loginBtn.style.color = "#6366f1";
            loginBtn.style.textShadow = "0 0 10px rgba(99, 102, 241, 0.3)";
        }

        // 3. Dashboard Layout Adjustment (Only for index.html)
        if (adminControls && mainContainer) {
            adminControls.style.display = "block";
            mainContainer.style.gridTemplateColumns = "320px 1fr";
            gsap.to(adminControls, { opacity: 1, x: 0, duration: 0.5 });
        }
    } else {
        // 1. Hide Settings Name
        if (settingsLink) settingsLink.style.display = "none";
        
        // 2. Style the Locked Icon (Standard Grey)
        if (loginBtn) {
            loginBtn.className = "fas fa-lock";
            loginBtn.style.color = "#475569";
            loginBtn.style.textShadow = "none";
        }

        // 3. Reset Layout (Only for index.html)
        if (adminControls && mainContainer) {
            adminControls.style.display = "none";
            mainContainer.style.gridTemplateColumns = "1fr";
        }
        
        // 4. Force Redirect if on Settings page while locked
        if (window.location.pathname.includes("settings.html")) {
            window.location.href = "index.html";
        }
    }
}
        // --- 2. NOTIFICATION SYSTEM ---
        function showModal(title, message) {
            const overlay = document.getElementById("modalOverlay");
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMsg").innerText = message;
            overlay.style.display = "flex";
            gsap.to(overlay, { opacity: 1, duration: 0.3 });
        }

        function closeModal() {
            gsap.to("#modalOverlay", { opacity: 0, duration: 0.2, onComplete: () => {
                document.getElementById("modalOverlay").style.display = "none";
            }});
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            document.getElementById("toastMsg").innerText = message;
            if(isError) toast.classList.add('error'); else toast.classList.remove('error');
            const tl = gsap.timeline();
            tl.to(toast, { y: -20, opacity: 1, duration: 0.5, ease: "expo.out" })
              .to(toast, { y: 100, opacity: 0, duration: 0.5, delay: 2.5, ease: "expo.in" });
        }

        // --- 3. DATA & RENDERING ---
        const renderDashboard = () => {
            const list = document.getElementById("noticeList");
            const notices = JSON.parse(localStorage.getItem('notices')) || [];
            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            
            if(notices.length === 0) {
                list.innerHTML = `<div class="glass-panel" style="text-align:center; padding:60px; color:#475569;"><p>No notices currently active.</p></div>`;
                return;
            }

            list.innerHTML = notices.map(n => `
                <div class="glass-panel notice-item" style="margin-bottom: 25px;" data-id="${n.id}">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <span class="tag ${n.type}">${n.type}</span>
                        ${isAdmin ? `<button class="delete-btn" onclick="deleteNotice(${n.id})" style="background:transparent; border:none; color:#475569; cursor:pointer;"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                    <h2 style="margin-top: 15px; font-weight: 800;">${n.title}</h2>
                    <p style="color: #94a3b8; margin-top: 12px; line-height: 1.7;">${n.desc}</p>
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;">
                        <small style="color: #475569;"><i class="far fa-calendar-alt"></i> ${n.date}</small>
                    </div>
                </div>
            `).join('');
            gsap.from(".notice-item", { opacity: 0, y: 20, duration: 0.5, stagger: 0.1 });
        };

        function addNotice() {
            const title = document.getElementById("title");
            const desc = document.getElementById("desc");
            const type = document.getElementById("type");

            if(!title.value || !desc.value) {
                gsap.to("#inputPanel", { x: 10, repeat: 5, yoyo: true, duration: 0.05 });
                showModal("Wait!", "Provide a title and message.");
                return;
            }

            const notices = JSON.parse(localStorage.getItem('notices')) || [];
            notices.unshift({ 
                title: title.value, desc: desc.value, type: type.value, 
                date: new Date().toLocaleString(), id: Date.now() 
            });

            localStorage.setItem('notices', JSON.stringify(notices));
            renderDashboard();
            showToast("Broadcast Live!");
            title.value = ""; desc.value = "";
        }

        function deleteNotice(id) {
            const item = document.querySelector(`[data-id="${id}"]`);
            gsap.to(item, { scale: 0.9, opacity: 0, x: 50, duration: 0.4, onComplete: () => {
                let notices = JSON.parse(localStorage.getItem('notices')) || [];
                notices = notices.filter(n => n.id !== id);
                localStorage.setItem('notices', JSON.stringify(notices));
                renderDashboard();
                showToast("Notice removed", true);
            }});
        }

        function applyGlobalBranding() {
            const savedName = localStorage.getItem('boardName');
            if (savedName) document.getElementById('logoText').innerText = savedName.toUpperCase();
        }

        // --- 4. INITIALIZATION ---
        window.onload = () => {
            applyGlobalBranding();
            checkAccess();
            gsap.from("nav", { y: -60, opacity: 0, duration: 1 });
        };

        // Listen for Enter key on password input
        document.getElementById("adminPassInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") verifyAdmin();
        });
    </script>
</body>
</html>
