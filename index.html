<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Notice Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px;
  animation: fadeDown 1s ease;
}

header h1 {
  font-size: 2.8rem;
  letter-spacing: 1px;
}

header p {
  opacity: 0.9;
}

/* CONTAINER */
.container {
  max-width: 750px;
  margin: auto;
  padding: 20px;
}

/* GLASS CARD */
.glass {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  animation: fadeUp 0.8s ease;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 1rem;
  transition: 0.3s;
}

input::placeholder {
  color: #ddd;
}

input:focus, select:focus {
  background: rgba(255,255,255,0.3);
  transform: scale(1.02);
}

/* BUTTON */
.add-btn {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(to right, #ff7e5f, #feb47b);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.add-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(255, 126, 95, 0.6);
}

/* NOTICE */
.notice {
  position: relative;
  margin-top: 15px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  animation: fadeInScale 0.4s ease;
  transition: all 0.3s ease;
}

.notice:hover {
  transform: translateY(-6px) scale(1.01);
}

/* TEXT */
.notice h3 {
  margin-bottom: 6px;
}

.notice p {
  color: #eee;
  font-size: 0.95rem;
}

/* TAG */
.tag {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: bold;
}

.exam { background: #ff4b5c; }
.event { background: #00c9a7; }
.general { background: #845ec2; }

/* DELETE BUTTON */
.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255, 0, 0, 0.7);
  border: none;
  border-radius: 50%;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: 0.3s;
}

.delete-btn:hover {
  transform: scale(1.2);
  background: red;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-30px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeInScale {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.8;
}
</style>
</head>

<body>

<header>
  <h1>📢 Smart Notice Board</h1>
  <p>Modern UI | Glassmorphism | CI/CD Enabled</p>
</header>

<div class="container">

  <!-- FORM -->
  <div class="glass">
    <h2>Add Notice</h2>
    <input type="text" id="title" placeholder="Enter title">
    <input type="text" id="desc" placeholder="Enter description">

    <select id="type">
      <option value="general">General</option>
      <option value="exam">Exam</option>
      <option value="event">Event</option>
    </select>

    <button class="add-btn" onclick="addNotice()">➕ Add Notice</button>
  </div>

  <!-- LIST -->
  <div id="noticeList"></div>

</div>

<footer>
  <p>© 2026 Smart Notice Board | CI/CD Project</p>
</footer>

<script>
function addNotice() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const type = document.getElementById("type").value;

  if (!title || !desc) {
    alert("Please fill all fields");
    return;
  }

  const notice = document.createElement("div");
  notice.className = "notice";

  notice.innerHTML = `
    <button class="delete-btn" onclick="this.parentElement.remove()">✖</button>
    <h3>${title}</h3>
    <p>${desc}</p>
    <span class="tag ${type}">${type.toUpperCase()}</span>
  `;

  document.getElementById("noticeList").prepend(notice);

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
}
</script>

</body>
</html>
